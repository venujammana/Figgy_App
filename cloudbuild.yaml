# cloudbuild.yaml
steps:
  # Build and Deploy User Service (Cloud Run)
  - id: 'Build User Service'
    name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/figgy-repo/user-service:$COMMIT_SHA', '.', '-f', './user_service/Dockerfile']
  - id: 'Push User Service Image'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/figgy-repo/user-service:$COMMIT_SHA']
  - id: 'Deploy User Service'
    name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'user-service'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/figgy-repo/user-service:$COMMIT_SHA'
      - '--platform'
      - 'managed'
      - '--region'
      - '${_REGION}'
      - '--service-account'
      - 'figgy-service-account@$PROJECT_ID.iam.gserviceaccount.com'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GCP_PROJECT=$PROJECT_ID'

  # Build and Deploy Order Processor (Cloud Run)
  - id: 'Build Order Processor'
    name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/figgy-repo/order-processor:$COMMIT_SHA', '.', '-f', './order_processor/Dockerfile']
  - id: 'Push Order Processor Image'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/figgy-repo/order-processor:$COMMIT_SHA']
  - id: 'Deploy Order Processor'
    name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'order-processor'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/figgy-repo/order-processor:$COMMIT_SHA'
      - '--platform'
      - 'managed'
      - '--region'
      - '${_REGION}'
      - '--service-account'
      - 'figgy-service-account@$PROJECT_ID.iam.gserviceaccount.com'
      - '--no-allow-unauthenticated' # Internal service, no direct unauthenticated access
      - '--set-env-vars'
      - 'GCP_PROJECT=$PROJECT_ID'
    waitFor: ['Deploy User Service', 'Push Order Processor Image']
  - id: 'Create Order Processor Pub/Sub Subscription'
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVICE_URL=$$(gcloud run services describe order-processor --platform managed --region ${_REGION} --format 'value(status.url)')
        gcloud pubsub subscriptions create order-processor-sub --topic orders.place --topic-project $PROJECT_ID --push-endpoint "$$SERVICE_URL" --push-auth-service-account="figgy-service-account@$PROJECT_ID.iam.gserviceaccount.com" --ack-deadline=300 --message-retention-duration=7d 2>&1 | grep -q "Resource already exists" && exit 0 || exit $? # Create or update, ignore if exists

  # Build and Deploy Restaurant Service (Cloud Run)
  - id: 'Build Restaurant Service'
    name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/figgy-repo/restaurant-service:$COMMIT_SHA', '.', '-f', './restaurant_service/Dockerfile']
  - id: 'Push Restaurant Service Image'
    name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/figgy-repo/restaurant-service:$COMMIT_SHA']
  - id: 'Deploy Restaurant Service'
    name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'restaurant-service'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/figgy-repo/restaurant-service:$COMMIT_SHA'
      - '--platform'
      - 'managed'
      - '--region'
      - '${_REGION}'
      - '--service-account'
      - 'figgy-service-account@$PROJECT_ID.iam.gserviceaccount.com'
      - '--no-allow-unauthenticated'
      - '--set-env-vars'
      - 'GCP_PROJECT=$PROJECT_ID'
    waitFor: ['Deploy Order Processor', 'Push Restaurant Service Image']
  - id: 'Create Restaurant Service Pub/Sub Subscription'
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVICE_URL=$$(gcloud run services describe restaurant-service --platform managed --region ${_REGION} --format 'value(status.url)')
        gcloud pubsub subscriptions create restaurant-service-sub --topic-project $PROJECT_ID --topic orders.created --push-endpoint "$$SERVICE_URL" --push-auth-service-account="figgy-service-account@$PROJECT_ID.iam.gserviceaccount.com" --ack-deadline=300 --message-retention-duration=7d 2>&1 | grep -q "Resource already exists" && exit 0 || exit $?

  # Deploy Delivery Completion Service (Cloud Function) - needs to be deployed first to get URL
  - id: 'Prepare Delivery Completion CF Source'
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cp -R common ./delivery_completion_service/common

  - id: 'Deploy Delivery Completion CF'
    name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'functions'
      - 'deploy'
      - 'delivery-completion-service'
      - '--runtime'
      - 'python39'
      - '--trigger-http'
      - '--source'
      - './delivery_completion_service'
      - '--entry-point'
      - 'cloud_function_entrypoint'
      - '--region'
      - '${_REGION}'
      - '--run-service-account'
      - 'figgy-service-account@$PROJECT_ID.iam.gserviceaccount.com'
      - '--allow-unauthenticated' # Cloud Tasks will handle auth via OIDC token
      - '--set-env-vars' # Pass PROJECT_ID for common client to initialize
      - 'GCP_PROJECT=$PROJECT_ID'

  # Deploy Delivery Orchestrator (Cloud Function)
  - id: 'Deploy Delivery Orchestrator CF'
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        DELIVERY_COMPLETION_URL=$$(gcloud functions describe delivery-completion-service --region ${_REGION} --format 'value(httpsTrigger.url)')
        gcloud functions deploy delivery-orchestrator --runtime python39 --trigger-http --source ./delivery_orchestrator --entry-point orchestrate_delivery --region "${_REGION}" --service-account="figgy-service-account@$PROJECT_ID.iam.gserviceaccount.com" --no-allow-unauthenticated --set-env-vars="DELIVERY_COMPLETION_URL=$$DELIVERY_COMPLETION_URL,GCP_PROJECT=$PROJECT_ID,FUNCTION_REGION=${_REGION},SERVICE_ACCOUNT_EMAIL=figgy-service-account@$PROJECT_ID.iam.gserviceaccount.com"
    waitFor: ['Deploy Delivery Completion CF', 'Deploy Restaurant Service', 'Deploy Order Processor', 'Deploy User Service']

# Set global environment variables
options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _REGION: us-central1 # Default region, override with --substitutions=_REGION=your-region
