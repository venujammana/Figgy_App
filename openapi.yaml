swagger: '2.0'
info:
  title: Figgy Food Delivery API
  description: API for placing and tracking food orders.
  version: 1.0.0
schemes:
  - https
produces:
  - application/json
paths:
  /orders:
    post:
      summary: Place a new order
      operationId: placeOrder
      x-google-backend:
        address: "[PASTE_YOUR_USER_SERVICE_URL_HERE]/orders"
        # For authenticated calls from API Gateway to Cloud Run
        # audience: [PASTE_YOUR_USER_SERVICE_URL_HERE]
      responses:
        '202': # Accepted, as Order Processor handles creation asynchronously
          description: Order initiated
          schema:
            type: object
            properties:
              message:
                type: string
              order_id:
                type: string
  /orders/{order_id}:
    get:
      summary: Get order status
      operationId: getOrder
      parameters:
        - in: path
          name: order_id
          type: string
          required: true
      x-google-backend:
        address: "[PASTE_YOUR_USER_SERVICE_URL_HERE]/orders/{order_id}"
        # audience: [PASTE_YOUR_USER_SERVICE_URL_HERE]
      responses:
        '200':
          description: Order details
          schema:
            type: object
            properties:
              order_id: {type: string}
              user_id: {type: string}
              restaurant_id: {type: string}
              items: {type: array, items: {type: string}}
              status: {type: string}
              created_at: {type: string, format: date-time}
              updated_at: {type: string, format: date-time}
        '404':
          description: Order not found
  /restaurants:
    get:
      summary: List all restaurants
      operationId: listRestaurants
      x-google-backend:
        address: "[PASTE_YOUR_USER_SERVICE_URL_HERE]/restaurants"
        # audience: [PASTE_YOUR_USER_SERVICE_URL_HERE]
      responses:
        '200':
          description: A list of restaurants
  /restaurants/{restaurant_id}:
    get:
      summary: Get restaurant details
      operationId: getRestaurant
      parameters:
        - in: path
          name: restaurant_id
          type: string
          required: true
      x-google-backend:
        address: "[PASTE_YOUR_USER_SERVICE_URL_HERE]/restaurants/{restaurant_id}"
        # audience: [PASTE_YOUR_USER_SERVICE_URL_HERE]
      responses:
        '200':
          description: Restaurant details
